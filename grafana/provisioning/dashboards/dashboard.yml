apiVersion: 1

providers:
  - name: 'Default'
    orgId: 1
    folder: 'General'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards

  - name: 'NetSuite Middleware'
    orgId: 1
    folder: 'NetSuite Middleware'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/netsuite
